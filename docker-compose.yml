version: '3.8'

services:
  # MongoDB Database Service
  mongo:
    image: mongo:latest
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - mern-network

  # Node.js Backend Server
  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      MONGO_URL: mongodb://mongo:27017/mydb
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:5000/api/test || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - mern-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  # React Frontend Client (Nginx)
  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - mern-network

# Named volumes for data persistence
volumes:
  mongo-data:
    driver: local

# Network for service communication
networks:
  mern-network:
    driver: bridge
