# Nginx configuration for React SPA (Single Page Application)
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # SPA routing: Send all requests to index.html except for existing files/directories
    # This allows React Router to handle all route definitions
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache busting for static assets with hash in filename (Vite default)
    # Cache for 1 year (31536000 seconds)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Prevent caching index.html
    # Always fetch latest version to get updated JS/CSS references
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Disable unwanted HTTP methods
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }
}
